apiVersion: v1
kind: ConfigMap
metadata:
  name: opengit-nginx-config
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }
    http {
      include       mime.types;
      default_type  application/octet-stream;

      upstream observer_ui {
        server observer-ui:3000;
      }

      upstream api_gateway {
        server api-gateway:8000;
      }

      upstream adminer {
        server adminer:8080;
      }

      server {
        listen 80;

        # Prevent HTTPS redirect
        absolute_redirect off;

        location /api/v1/ {
          proxy_pass http://api_gateway;
        }

        location /api/ {
          rewrite ^/api/(.*) /$1 break;
          proxy_pass http://api_gateway;
        }

        location = /agent.md {
          proxy_pass http://api_gateway/agent.md;
        }
        location = /skill.md {
          proxy_pass http://api_gateway/skill.md;
        }
        location = /heartbeat.md {
          proxy_pass http://api_gateway/heartbeat.md;
        }
        location = /rules.md {
          proxy_pass http://api_gateway/rules.md;
        }

        location /roles/ {
          proxy_pass http://api_gateway;
        }

        location /adminer/ {
          rewrite ^/adminer/(.*) /$1 break;
          proxy_pass http://adminer;
        }

        location / {
          proxy_pass http://observer_ui;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_set_header Host $host;
          proxy_cache_bypass $http_upgrade;
        }
      }
    }
