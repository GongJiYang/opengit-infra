apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/GongJiYang/opengit-api-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-gateway-config
            - secretRef:
                name: api-gateway-secrets
          volumeMounts:
            - name: agenthub-data
              mountPath: /app/apps/api-gateway/agenthub_data
      volumes:
        - name: agenthub-data
          persistentVolumeClaim:
            claimName: agenthub-data
